<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - CHEERFUL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                CHEERFUL <span>Admin</span>
            </div>
            <h1 class="login-title">管理员登录</h1>
            <p class="login-subtitle">欢迎回来，请登录您的账户</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    class="form-control"
                    placeholder="请输入用户名"
                    required
                    autocomplete="username"
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="请输入密码"
                    required
                    autocomplete="current-password"
                />
            </div>

            <button type="submit" class="btn-login" id="submitBtn">登录</button>
        </form>

    </div>

    <script>
        // API 基础 URL
        const API_BASE_URL = 'https://cheerful.vsharev.com/api';

        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            // 清除之前的消息
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // 验证输入
            if (!username || !password) {
                errorMsg.textContent = '用户名和密码不能为空';
                errorMsg.style.display = 'block';
                return;
            }

            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    successMsg.textContent = '登录成功，正在跳转...';
                    successMsg.style.display = 'block';

                    // 保存token和用户信息
                    localStorage.setItem('adminToken', data.data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.data.user));

                    // 1秒后跳转到管理页面
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    errorMsg.textContent = data.message || '登录失败';
                    errorMsg.style.display = 'block';
                    document.getElementById('password').value = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请检查服务器是否运行';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });

        // 检查是否已登录，已登录则跳转到管理页面
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
